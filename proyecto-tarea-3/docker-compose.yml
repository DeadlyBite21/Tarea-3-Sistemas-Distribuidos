version: "3.8"

services:
  # --- 1. Master de HDFS (Almacenamiento) ---
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    restart: always
    ports:
      - "9870:9870"  # Interfaz web de HDFS
      - "9000:9000"  # Puerto de acceso a HDFS
    volumes:
      - namenode-data:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=hadoop-cluster
    networks:
      - hadoop-net

  # --- 2. Esclavo de HDFS (Almacenamiento) ---
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    restart: always
    depends_on:
      - namenode
    volumes:
      - datanode-data:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    networks:
      - hadoop-net

  # --- 3. Master de YARN (Procesamiento MapReduce) ---
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    hostname: resourcemanager
    restart: always
    depends_on:
      - namenode
      - datanode
    ports:
      - "8088:8088"  # Interfaz web de YARN
    environment:
      SERVICE_PRECONDITION: "namenode:9870 datanode:9864"
    networks:
      - hadoop-net

  # --- 4. Esclavo de YARN (Procesamiento MapReduce) ---
  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    hostname: nodemanager
    restart: always
    depends_on:
      - resourcemanager
    environment:
      SERVICE_PRECONDITION: "resourcemanager:8088"
    networks:
      - hadoop-net

  # --- 5. Cliente de Pig (Tu "consola" para lanzar trabajos) ---
  pig-client:
    image: bde2020/hadoop-pig:0.17.0-hadoop3.2.1-java8 # <-- ¡Esta imagen es perfecta!
    container_name: pig-client
    hostname: pig-client
    depends_on:
      - namenode
      - resourcemanager
    volumes:
      # Asume que las carpetas están al MISMO NIVEL que tu docker-compose.yml
      - ./scripts-pig:/app/scripts 
      - ./data_compartida:/app/data_input
      - ./data-output:/app/data_output
    environment:
      # --- INICIO DE AJUSTES ---
      # 1. Le dice a Pig (y Hadoop) dónde está el NameNode (HDFS)
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      # 2. Le dice a Pig (y YARN) dónde está el ResourceManager para enviar trabajos
      - YARN_CONF_yarn_resourcemanager_address=resourcemanager:8032
      # --- FIN DE AJUSTES ---
      - HADOOP_CONF_DIR=/etc/hadoop
      - HADOOP_USER_NAME=root
    networks:
      - hadoop-net
    command: tail -f /dev/null 

# --- Red y Volúmenes ---
networks:
  hadoop-net:
    driver: bridge

volumes:
  namenode-data:
    driver: local
  datanode-data:
    driver: local